services:
  vpn-server:
    build:
      context: .
      dockerfile: ./server/Dockerfile
    privileged: true
    cap_add:
      - NET_ADMIN
    devices:
      - "/dev/net/tun:/dev/net/tun"
    networks:
      vpn_net:
        ipv4_address: 172.20.0.10

  vpn-client:
    build:
      context: .
      dockerfile: ./client/Dockerfile
    cap_add:
      - NET_ADMIN
    devices:
      - "/dev/net/tun:/dev/net/tun"
    depends_on:
      - vpn-server
    networks:
      vpn_net:
        ipv4_address: 172.20.0.2

networks:
  vpn_net:
    ipam:
      config:
        - subnet: 172.20.0.0/24
